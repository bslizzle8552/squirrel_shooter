<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#18241d">
    <title>{% block title %}Squirrel Squirter{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="{{ url_for('dashboard') }}" aria-label="Squirrel Squirter dashboard"><span class="brand-mark" aria-hidden="true">SS</span><span>Squirrel Squirter</span></a>
        <nav aria-label="Main navigation"><a href="{{ url_for('dashboard') }}">Live camera</a><a href="{{ url_for('captures') }}">Captures</a></nav>
      </div>
    </header>
    <main class="shell">{% block content %}{% endblock %}</main>
    <footer class="shell site-footer">Private local dashboard &middot; Keep access inside your Tailnet</footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
