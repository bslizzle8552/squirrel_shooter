# Conservative starting values for a fixed 1280x720 garden camera currently
# observed near 10 FPS.  Tune these after reviewing saved events.
camera:
  device_index: 0
  requested_width: 1280
  requested_height: 720
  requested_fps: 30
  output_directory: captures
  camera_mode_if_known: unknown
  ir_mode_if_explicitly_detected_or_configured: unknown
  low_fps_threshold: 15.0
  reopen_after_failed_reads: 10
  reopen_delay_seconds: 2.0

# One process owns the camera and publishes frames to every consumer.
shared_camera:
  reconnect_enabled: true
  maximum_consecutive_read_failures: 10
  reconnect_delay_seconds: 2.0
  consumer_wait_timeout_seconds: 1.0
  annotated_frame_stale_seconds: 3.0

runtime:
  headless: false
  shutdown_timeout_seconds: 10.0

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 5000
  stream_fps: 8.0
  jpeg_quality: 82
  status_refresh_interval_seconds: 3.0

# Pause evidence recording and classifier CPU work while the camera is producing
# sustained monochrome night-vision frames. The live feed remains available.
night_mode:
  pause_recording_and_classifier: true
  monochrome_colorfulness_threshold: 8.0
  enter_consecutive_frames: 5
  exit_consecutive_frames: 10

# One asynchronous classification of the best valid in-frame motion candidate
# after each event completes. The pinned MobileNet-SSD model is unchanged.
classifier:
  enabled: true
  model_definition: models/mobilenet-ssd/deploy.prototxt
  model_weights: models/mobilenet-ssd/mobilenet_iter_73000.caffemodel
  frame_selection: best
  fallback_event_frame_number: 1
  crop_margin_percent: 30.0
  detection_confidence: 0.25
  auto_accept_confidence: 0.60
  auto_accept_labels:
    - person
    - car
  evidence_directory: captures/classifier  # read-only legacy source for migration
  audit_log_filename: classifier.jsonl
  worker_queue_capacity: 1

motion:
  enabled: true
  processing_width: 640
  history: 500
  variance_threshold: 32
  detect_shadows: true
  blur_kernel: 7
  morphology_kernel: 5
  open_iterations: 1
  close_iterations: 2
  min_blob_area: 500
  max_blob_area: 150000
  recent_event_limit: 100

  startup_warmup:
    seconds: 12.0
    minimum_frames: 60

  # Ignore the sky above 26% of the frame. This matches the visible tree-line
  # cutoff near y=187 on the current 1280x720 camera view.
  inclusion_zone:
    enabled: true
    polygon:
      - [0.0, 0.26]
      - [1.0, 0.26]
      - [1.0, 1.0]
      - [0.0, 1.0]

  persistence:
    frames: 5
    max_centroid_distance_pixels: 100
    maximum_gap_seconds: 0.7
    cooldown_seconds: 8.0

  # Keep weak motion visible for tuning, but do not turn it into a saved event.
  candidate_filter:
    enabled: true
    minimum_frame_percent: 0.15
    ignore_tiny_motion: true
    ignore_plant_or_shadow_flicker: true
    require_coherent_small_motion: true
    small_motion_minimum_travel_pixels: 10.0

  grouping:
    enabled: true
    max_horizontal_gap_pixels: 80
    max_vertical_gap_pixels: 80
    expanded_box_margin_pixels: 40
    max_centroid_distance_pixels: 140
    direction_similarity_degrees: 50
    speed_similarity_ratio: 2.5
    maximum_components_per_group: 12

  global_rejection:
    enabled: true
    max_frame_motion_percent: 35.0
    max_zone_motion_percent: 45.0
    recovery_seconds: 3.0
    log_rejected_global_events: true
    save_debug_snapshot: false
    exposure_luminance_delta: 35.0
    ir_colorfulness_delta: 18.0
    obstruction_motion_percent: 80.0

  event_lifecycle:
    pre_event_seconds: 2.0
    post_event_seconds: 3.0
    maximum_event_seconds: 60.0
    clip_codec: MJPG

  provisional_classification:
    tiny_max_frame_percent: 0.08
    small_animal_max_frame_percent: 1.5
    medium_animal_max_frame_percent: 5.0
    person_min_height_percent: 35.0
    large_object_min_frame_percent: 5.0
    flicker_min_components: 5
    stationary_speed_pixels_per_second: 8.0
    slow_speed_pixels_per_second: 30.0
    fast_speed_pixels_per_second: 150.0

  # Backward-compatible settings used by the read-only dashboard detector.
  learning_frames: 90
  persistence_frames: 3
  persistence_max_distance: 80
  cooldown_seconds: 8
  lighting_change_percent: 65
  roi:
    enabled: false
    x: 0.0
    y: 0.0
    width: 1.0
    height: 1.0
  debug_outputs:
    directory: debug
    min_interval_seconds: 5
    foreground_mask: false
    cleaned_mask: false
    annotated_frame: false
    roi_visualization: false
    rejected_candidate_frame: false

reporting:
  directory: captures/reports
  thumbnail_width: 320
  rebuild_on_clean_shutdown: true

retention:
  maximum_storage_megabytes: 4096
  maximum_event_age_days: 30
  maximum_event_count: 1000

health:
  camera_stale_seconds: 3
  detector_stale_seconds: 5

# Legacy dashboard limits remain separate from complete watcher event retention.
storage:
  max_event_captures: 500
  max_debug_images: 200
  max_log_files: 14

logging:
  level: INFO
  directory: captures/logs
  event_csv: events.csv
  event_jsonl: events.jsonl
  rejection_jsonl: rejections.jsonl
  sessions_directory: sessions
  maximum_active_log_megabytes: 100
  retained_log_rotations: 5
